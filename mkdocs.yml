site_name: UofA CS Wiki
site_description: A practical, opinionated guide to pursuing CS at the University of Alberta
site_url: https://uofa-cs.github.io/uofa-cs-wiki/
repo_url: https://github.com/uofa-cs/uofa-cs-wiki
repo_name: uofa-cs/uofa-cs-wiki

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - scheme: default
      primary: green
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github

docs_dir: wiki-content

nav:
  - Home: README.md
  - Getting Started:
    - Program Overview: docs/getting-started/program-overview.md
    - Degree Planning: docs/getting-started/degree-planning.md
    - First Year Guide: docs/getting-started/first-year-guide.md
  - Courses:
    - Course Guide: docs/courses/course-guide.md
    - Course Reviews: docs/courses/course-reviews.md
    - Elective Strategy: docs/courses/elective-strategy.md
    - Hidden Gems: docs/courses/hidden-gems.md
    - Professor Guide: docs/courses/professor-guide.md
  - Skills:
    - What to Learn: docs/skills/what-to-learn.md
    - Programming Languages: docs/skills/programming-languages.md
    - Tools and Setup: docs/skills/tools-and-setup.md
    - System Design: docs/skills/system-design.md
    - Side Projects: docs/skills/side-projects.md
  - Career:
    - Internships: docs/career/internships.md
    - Resume Guide: docs/career/resume-guide.md
    - Interview Prep: docs/career/interview-prep.md
    - New Grad: docs/career/new-grad.md
    - Career Paths: docs/career/career-paths.md
    - Edmonton Tech Scene: docs/career/edmonton-tech-scene.md
  - Research:
    - Getting into Research: docs/research/getting-into-research.md
    - Grad School: docs/research/grad-school.md
    - UAlberta Labs: docs/research/ualberta-labs.md
  - Community:
    - Clubs and Organizations: docs/community/clubs-and-orgs.md
    - Networking: docs/community/networking.md
    - Online Presence: docs/community/online-presence.md
  - Resources:
    - Learning Resources: docs/resources/learning-resources.md
    - Scholarships: docs/resources/scholarships.md
    - FAQ: docs/resources/faq.md

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - git-revision-date-localized:
      enable_creation_date: true
  - social:
      cards_layout_options:
        background_color: "#2E8B57"

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - tables

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/uofa-cs/uofa-cs-wiki
    - icon: fontawesome/solid/school
      link: https://www.ualberta.ca/computing-science/index.html
  analytics:
    provider: google
    property: !ENV [GOOGLE_ANALYTICS_KEY, ""]

extra_css:
  - stylesheets/extra.css

copyright: |
  Built by UofA CS students, for UofA CS students. Not affiliated with or endorsed by the University of Alberta.